<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tuyển sinh</title>
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}
body {
  height: 100vh;
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("nendki.png") no-repeat center/cover;
  z-index: -1;
}
.form-box {
  width: 380px;
  padding: 30px;
  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.form-box h2 {
  text-align: center;
  margin-bottom: 20px;
}
.form-box input,
.form-box select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  background: #eee;
  border-radius: 6px;
}
.form-box button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  background: #0047C6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
.form-box button:hover {
  background: #003399;
}
.back-home {
  display: block;
  text-align: center;
  margin-top: 15px;
  text-decoration: none;
  color: #555;
  font-size: 14px;
}
.back-home:hover {
  color: #0047C6;
}
.logo {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 12px;
  z-index: 10;
  transition: 0.3s;
  filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
}
.logo img {
  width: 200px;
  height: auto;
}


.form-box button{
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(135deg,#0047C6,#0066ff);
  color: white;
  font-weight: bold;
  cursor: pointer;

  transition: all 0.2s ease;
}
.form-box button:hover{
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,71,198,0.4);
}
.form-box button:active{
  transform: scale(0.96);
}
    </style>
</head>
<body>
     <div class="background"></div>

     <div class="logo">
         <a href="index.html">
         <img src="logo hvpnvn trắng.png" alt="">
         </a>
     </div>
     
     <div class="form-box">
         <h2>Đăng ký tuyển sinh</h2>
         <input type="text" placeholder="Họ và tên">
         <input type="text" placeholder="Số điện thoại">
         <input type="email" placeholder="Email">

         <select>
             <option>Chọn ngành học</option>
             <option>Công nghệ thông tin</option>
             <option>Marketing</option>
             <option>Kinh tế</option>
             <option>Truyền thông đa phương tiện</option>
             <option>Quản trị kinh doanh</option>
             <option>Luật</option>
             <option>Luật kinh tế</option>
             <option>Tâm lý học</option>
             <option>Công tác xã hội</option>
             <option>Giới và phát triển</option>
             <option>Quản trị dịch vụ du lịch và lữ hành</option>
         </select>

         <button onclick="submitForm(this)">Đăng ký</button>
         <a href="index.html" class="back-home">← Trang chủ</a>

     </div>


     <script>
function submitForm(btn){
  const form = document.querySelector(".form-box");
  btn.innerText = "Đang gửi...";
  btn.disabled = true;

  setTimeout(()=>{
    btn.innerText = "✔ Thành công!";
    btn.style.background = "#28a745";

    // reset form (xoá sạch dữ liệu)
    form.reset();

    setTimeout(()=>{
      btn.innerText = "Đăng ký";
      btn.style.background = "";
      btn.disabled = false;
    },1500);

  },2000);
}
</script>


</body>
</html>
